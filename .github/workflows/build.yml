name: Build & Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | sed "s/.*\"\(.*\)\".*/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          python3 -c "
          import base64, os
          data = base64.b64decode(os.environ['KEYSTORE_B64'])
          open('${{ runner.temp }}/release.jks', 'wb').write(data)
          print(f'Keystore decoded: {len(data)} bytes')
          "

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Delete existing tag (if any)
        run: |
          git tag -d ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push origin :refs/tags/${{ steps.version.outputs.tag }} 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          make_latest: true
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}

      - name: Generate release notes from AppChangelog.kt
        id: notes
        run: |
          python3 - <<'PY' > /tmp/release_body.md
          import re, sys, os
          ver = "${{ steps.version.outputs.version }}"
          src = open('app/src/main/java/com/xjtu/toolbox/util/AppChangelog.kt', encoding='utf-8').read()
          # 匹配 "X.Y.Z" to VersionChangelog( ... ),
          pattern = rf'"{re.escape(ver)}"\s*to\s*VersionChangelog\((.*?)\n\s*\)\s*,?\s*(?:"|//|$)'
          m = re.search(pattern, src, re.S)
          if not m:
              # 兜底：版本号是 ENTRIES 第一个元素时后面没逗号
              pattern2 = rf'"{re.escape(ver)}"\s*to\s*VersionChangelog\((.*?)\n\s*\)'
              m = re.search(pattern2, src, re.S)
          if not m:
              print(f"## 岱宗盒子 v{ver}\n\n本次更新见应用内「设置 → 关于 → 更新日志」。")
              sys.exit(0)
          block = m.group(1)
          # 提取 items: "emoji" to "text"
          items_match = re.search(r'items\s*=\s*listOf\((.*?)\)\s*(?:,\s*issues|\)|$)', block, re.S)
          items = []
          if items_match:
              items = re.findall(r'"([^"]+)"\s*to\s*"([^"]+)"', items_match.group(1))
          # 提取 issues
          issues = []
          issues_match = re.search(r'issues\s*=\s*listOf\((.*?)\)', block, re.S)
          if issues_match:
              issues = re.findall(r'"([^"]+)"', issues_match.group(1))

          out = [f"## 岱宗盒子 v{ver}", ""]
          if items:
              out.append("### 更新内容")
              out.append("")
              for emoji, text in items:
                  out.append(f"- {emoji} {text}")
              out.append("")
          if issues:
              out.append("### 已知问题")
              out.append("")
              for i in issues:
                  out.append(f"- {i}")
              out.append("")
          out.append("---")
          out.append("APK 已附在本 Release，可直接下载安装。")
          print("\n".join(out))
          PY
          echo "Generated release notes:"
          cat /tmp/release_body.md
          # 转义为 JSON 安全字符串供下一步使用
          python3 -c "import json; print(json.dumps(open('/tmp/release_body.md', encoding='utf-8').read()))" > /tmp/release_body.json
          echo "body_json_path=/tmp/release_body.json" >> $GITHUB_OUTPUT

      - name: Sync to Gitee (code + tag + release)
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          OWNER="yeliqin666"
          REPO="xjtu-toolbox-android"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"

          # 配置 Gitee remote
          git remote add gitee "https://yeliqin666:${GITEE_TOKEN}@gitee.com/${OWNER}/${REPO}.git" 2>/dev/null || \
            git remote set-url gitee "https://yeliqin666:${GITEE_TOKEN}@gitee.com/${OWNER}/${REPO}.git"

          # 同步 main 分支
          git push gitee main:main --force
          echo "Code synced to Gitee"

          # 拉取 tag（release action 在 remote 创建了 tag，本地可能没有）
          git fetch origin --tags --force
          git push gitee "${TAG}" --force
          echo "Tag ${TAG} synced to Gitee"

          # 删除已有的同名 Gitee release
          OLD_ID=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -n "$OLD_ID" ] && [ "$OLD_ID" != "None" ] && [ "$OLD_ID" != "" ]; then
            curl -s -X DELETE "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${OLD_ID}?access_token=${GITEE_TOKEN}" || true
            echo "Deleted old Gitee release $OLD_ID"
          fi

          # 读取由上一步生成的 release body（已经是 JSON 字符串字面量，含两端引号）
          BODY_JSON=$(cat /tmp/release_body.json)

          # 创建 Gitee release（target_commitish 必填）
          RELEASE=$(curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": ${BODY_JSON},
              \"target_commitish\": \"main\",
              \"prerelease\": false
            }")
          echo "Create response: $RELEASE"
          RELEASE_ID=$(echo "$RELEASE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "None" ]; then
            echo "Failed to get release ID, skipping APK upload. Response: $RELEASE"
            exit 0
          fi
          echo "Created Gitee release $RELEASE_ID"

          # 上传 APK
          echo "APK file size: $(wc -c < ${APK_PATH}) bytes"
          HTTP_CODE=$(curl --max-time 1200 --progress-bar -w "%{http_code}" \
            -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${APK_PATH};type=application/vnd.android.package-archive") || HTTP_CODE="000"
          echo "Upload HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "APK uploaded to Gitee release"
          else
            echo "Upload failed with HTTP $HTTP_CODE, but continuing"
          fi